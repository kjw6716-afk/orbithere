<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0F172A; /* 미드나잇 블루 */
            color: #E2E8F0;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .meteor {
            position: absolute;
            top: -150px;
            width: 1px;
            height: 90px;
            background: linear-gradient(to bottom, rgba(79, 209, 197, 0), #4FD1C5);
            border-radius: 999px;
            transform: rotate(45deg);
            animation: fall linear infinite;
            opacity: 0;
            filter: drop-shadow(0 0 5px #4FD1C5);
        }

        /* 20개의 유성을 화면 전체에 랜덤하게 배치 */
        .meteor:nth-child(1) { left: 5%; animation-duration: 3s; animation-delay: 0s; }
        .meteor:nth-child(2) { left: 15%; animation-duration: 4.2s; animation-delay: 1.2s; height: 60px; }
        .meteor:nth-child(3) { left: 25%; animation-duration: 3.5s; animation-delay: 0.5s; width: 2px; }
        .meteor:nth-child(4) { left: 35%; animation-duration: 5s; animation-delay: 2.8s; }
        .meteor:nth-child(5) { left: 45%; animation-duration: 2.8s; animation-delay: 1.5s; height: 120px; }
        .meteor:nth-child(6) { left: 55%; animation-duration: 4.5s; animation-delay: 0.2s; }
        .meteor:nth-child(7) { left: 65%; animation-duration: 3.2s; animation-delay: 3.5s; width: 2px; }
        .meteor:nth-child(8) { left: 75%; animation-duration: 5.5s; animation-delay: 0.8s; }
        .meteor:nth-child(9) { left: 85%; animation-duration: 3.8s; animation-delay: 2.2s; }
        .meteor:nth-child(10) { left: 95%; animation-duration: 4s; animation-delay: 1.1s; }
        .meteor:nth-child(11) { left: 10%; animation-duration: 4.8s; animation-delay: 4.2s; }
        .meteor:nth-child(12) { left: 20%; animation-duration: 3.1s; animation-delay: 5s; height: 70px; }
        .meteor:nth-child(13) { left: 40%; animation-duration: 4s; animation-delay: 1.8s; }
        .meteor:nth-child(14) { left: 50%; animation-duration: 5.2s; animation-delay: 3.3s; width: 2px; }
        .meteor:nth-child(15) { left: 60%; animation-duration: 3.6s; animation-delay: 0.7s; }
        .meteor:nth-child(16) { left: 70%; animation-duration: 4.4s; animation-delay: 2.5s; }
        .meteor:nth-child(17) { left: 80%; animation-duration: 2.9s; animation-delay: 1.9s; height: 100px; }
        .meteor:nth-child(18) { left: 90%; animation-duration: 5.8s; animation-delay: 0.3s; }
        .meteor:nth-child(19) { left: 30%; animation-duration: 3.4s; animation-delay: 3.9s; }
        .meteor:nth-child(20) { left: 52%; animation-duration: 4.1s; animation-delay: 2.1s; }

        @keyframes fall {
            0% { transform: translate(150px, -150px) rotate(45deg); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.3; }
            100% { transform: translate(-120vw, 120vh) rotate(45deg); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .title {
            font-size: 1.6rem;
            font-weight: 200;
            letter-spacing: -0.05em;
            color: #E2E8F0;
            margin: 0;
            text-shadow: 0 0 30px rgba(15, 23, 42, 0.8);
        }

        .highlight {
            color: #4FD1C5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="starfield">
        <!-- 20개의 유성 -->
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
    </div>
    
    <div class="content">
        <h1 class="title">현재 <span class="highlight">궤도</span>를 만드는 중입니다.</h1>
    </div>
</body>
</html>
