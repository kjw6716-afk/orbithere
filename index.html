<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>궤도</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0F172A; /* 미드나잇 블루 */
            color: #E2E8F0;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        /* 유성우 아이콘 컨테이너 */
        .meteor-shower {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
        }

        /* 유성우 개별 입자 */
        .meteor {
            position: absolute;
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, rgba(79, 209, 197, 0), #4FD1C5); /* 민트색 그라데이션 */
            border-radius: 999px;
            transform: rotate(135deg);
            animation: fall 2s linear infinite;
            opacity: 0;
        }

        /* 여러 개의 유성우 위치와 속도 조절 */
        .meteor:nth-child(1) { left: 20%; animation-delay: 0s; }
        .meteor:nth-child(2) { left: 50%; animation-delay: 0.7s; }
        .meteor:nth-child(3) { left: 80%; animation-delay: 1.4s; }

        @keyframes fall {
            0% { transform: translate(50px, -50px) rotate(135deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50px, 50px) rotate(135deg); opacity: 0; }
        }

        .title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-top: 20px;
        }

        .status-box {
            margin-top: 30px;
            padding: 10px 24px;
            border: 1px solid rgba(79, 209, 197, 0.4);
            border-radius: 30px;
            font-size: 0.95rem;
            color: #4FD1C5;
            background-color: rgba(79, 209, 197, 0.05);
        }
    </style>
</head>
<body>
    <div class="meteor-shower">
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
    </div>
    
    <div class="title">현재 궤도를 만드는 중입니다.</div>
</body>
</html>
