<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0F172A; /* 미드나잇 블루 */
            color: #E2E8F0;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .meteor {
            position: absolute;
            top: -100px;
            width: 1px;
            height: 90px;
            background: linear-gradient(to bottom, rgba(79, 209, 197, 0), #4FD1C5);
            border-radius: 999px;
            transform: rotate(45deg);
            animation: fall linear infinite;
            opacity: 0;
            filter: drop-shadow(0 0 4px #4FD1C5);
        }

        /* 속도를 늦추기 위해 animation-duration을 6s~12s 사이로 대폭 증가 */
        /* 모바일 쏠림 방지를 위해 시작점(left)을 30%~160% 사이 우측 영역으로 집중 배치 */
        .meteor:nth-child(1) { left: 30%; animation-duration: 7s; }
        .meteor:nth-child(2) { left: 50%; animation-duration: 10s; animation-delay: 1.5s; }
        .meteor:nth-child(3) { left: 70%; animation-duration: 8s; animation-delay: 0.8s; }
        .meteor:nth-child(4) { left: 90%; animation-duration: 12s; animation-delay: 3s; }
        .meteor:nth-child(5) { left: 110%; animation-duration: 6s; animation-delay: 2s; height: 120px; }
        .meteor:nth-child(6) { left: 130%; animation-duration: 9s; animation-delay: 4.5s; }
        .meteor:nth-child(7) { left: 40%; animation-duration: 11s; animation-delay: 1s; }
        .meteor:nth-child(8) { left: 60%; animation-duration: 7.5s; animation-delay: 5s; }
        .meteor:nth-child(9) { left: 85%; animation-duration: 10.5s; animation-delay: 2.5s; }
        .meteor:nth-child(10) { left: 140%; animation-duration: 8.5s; animation-delay: 0.5s; }
        .meteor:nth-child(11) { left: 160%; animation-duration: 11.5s; animation-delay: 6s; }
        .meteor:nth-child(12) { left: 20%; animation-duration: 9.5s; animation-delay: 3.5s; }
        .meteor:nth-child(13) { left: 75%; animation-duration: 7.2s; animation-delay: 1.2s; }
        .meteor:nth-child(14) { left: 95%; animation-duration: 10.2s; animation-delay: 4.8s; }
        .meteor:nth-child(15) { left: 120%; animation-duration: 8.8s; animation-delay: 2.2s; }
        .meteor:nth-child(16) { left: 150%; animation-duration: 12.5s; animation-delay: 0.3s; }
        .meteor:nth-child(17) { left: 45%; animation-duration: 6.5s; animation-delay: 5.5s; }
        .meteor:nth-child(18) { left: 105%; animation-duration: 9.2s; animation-delay: 1.9s; }
        .meteor:nth-child(19) { left: 135%; animation-duration: 11s; animation-delay: 3.1s; }
        .meteor:nth-child(20) { left: 80%; animation-duration: 7.8s; animation-delay: 0.9s; }

        /* v3.3의 안정적인 45도 직선 각도 복구 */
        @keyframes fall {
            0% { transform: translate(0, 0) rotate(45deg); opacity: 0; }
            10% { opacity: 0.7; }
            80% { opacity: 0.3; }
            100% { transform: translate(-1200px, 1200px) rotate(45deg); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* 원을 제거한 고품격 '나침반 별' 아이콘 */
        .brand-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 25px;
            display: inline-block;
            position: relative;
            animation: float 4s infinite ease-in-out;
        }

        /* 십자 모양의 빛나는 별 */
        .brand-icon::before, .brand-icon::after {
            content: '';
            position: absolute;
            background-color: #4FD1C5;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 999px;
            filter: drop-shadow(0 0 8px #4FD1C5);
        }

        .brand-icon::before { width: 2px; height: 100%; } /* 세로축 */
        .brand-icon::after { width: 100%; height: 2px; }  /* 가로축 */

        /* 중앙의 반짝이는 점 */
        .brand-icon-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: #E2E8F0;
            border-radius: 50%;
            box-shadow: 0 0 15px #4FD1C5;
            z-index: 2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); opacity: 0.9; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        .title {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: -0.05em;
            color: #E2E8F0;
            margin: 0;
            text-shadow: 0 0 30px rgba(15, 23, 42, 1);
        }

        .highlight {
            color: #4FD1C5;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .title { font-size: 1.25rem; }
            .brand-icon { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>
    <div class="starfield">
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
    </div>
    
    <div class="content">
        <div class="brand-icon">
            <div class="brand-icon-inner"></div>
        </div>
        <h1 class="title">현재 <span class="highlight">궤도</span>를 만드는 중입니다.</h1>
    </div>
</body>
</html>
