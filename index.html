<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0F172A; /* 미드나잇 블루 */
            color: #E2E8F0;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        /* 유성우 배경 컨테이너 */
        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* 유성이 클릭을 방해하지 않도록 설정 */
        }

        .meteor {
            position: absolute;
            top: -100px;
            width: 1px; /* 더 날카로운 느낌을 위해 1px로 조정 */
            height: 80px;
            background: linear-gradient(to bottom, rgba(79, 209, 197, 0), #4FD1C5);
            border-radius: 999px;
            transform: rotate(45deg);
            animation: fall linear infinite;
            opacity: 0;
            filter: drop-shadow(0 0 4px #4FD1C5);
        }

        /* 화면 전체에 골고루 배치 (왼쪽부터 오른쪽까지) */
        .meteor:nth-child(1) { left: 10%; animation-duration: 3s; animation-delay: 0s; }
        .meteor:nth-child(2) { left: 25%; animation-duration: 4.5s; animation-delay: 1s; height: 50px; }
        .meteor:nth-child(3) { left: 45%; animation-duration: 3.5s; animation-delay: 0.5s; }
        .meteor:nth-child(4) { left: 60%; animation-duration: 5s; animation-delay: 2s; width: 2px; }
        .meteor:nth-child(5) { left: 75%; animation-duration: 2.8s; animation-delay: 1.5s; }
        .meteor:nth-child(6) { left: 90%; animation-duration: 4s; animation-delay: 0.2s; }
        .meteor:nth-child(7) { left: 15%; animation-duration: 5.5s; animation-delay: 3s; width: 2px; }
        .meteor:nth-child(8) { left: 35%; animation-duration: 3.2s; animation-delay: 2.5s; height: 100px; }
        .meteor:nth-child(9) { left: 55%; animation-duration: 4.2s; animation-delay: 4s; }
        .meteor:nth-child(10) { left: 85%; animation-duration: 3.8s; animation-delay: 1.2s; }

        @keyframes fall {
            0% { transform: translate(100px, -100px) rotate(45deg); opacity: 0; }
            20% { opacity: 0.7; }
            60% { opacity: 0.3; }
            100% { transform: translate(-1000px, 1000px) rotate(45deg); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .title {
            font-size: 1.6rem;
            font-weight: 200;
            letter-spacing: -0.05em;
            color: #E2E8F0;
            margin: 0;
            text-shadow: 0 0 20px rgba(15, 23, 42, 1); /* 글자가 유성에 묻히지 않게 살짝 그림자 */
        }

        .highlight {
            color: #4FD1C5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="starfield">
        <!-- 10개의 유성 추가 -->
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
    </div>
    
    <div class="content">
        <h1 class="title">현재 <span class="highlight">궤도</span>를 만드는 중입니다.</h1>
    </div>
</body>
</html>
